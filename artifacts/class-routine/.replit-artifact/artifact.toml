kind = "web"
previewPath = "/"
title = "Class Routine Manager"
version = "1.0.0"
id = "artifacts/class-routine"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25271
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/class-routine run dev"

[services.env]
PORT = "25271"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/class-routine", "run", "build"]
publicDir = "artifacts/class-routine/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
